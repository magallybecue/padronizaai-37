version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: catmat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: catmat_align
      POSTGRES_USER: catmat_user
      POSTGRES_PASSWORD: catmat_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catmat_user -d catmat_align"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: catmat-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://catmat_user:catmat_password@postgres:5432/catmat_align
      - JWT_SECRET=your-super-secure-jwt-secret
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
